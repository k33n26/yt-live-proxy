name: Build

on:
  push:

jobs:

  build:

    runs-on:
      ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - run: python scripts/build.py

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "auto build" || exit 0

          git push
